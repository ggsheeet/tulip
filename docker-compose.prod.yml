services:
  tulip_app:
    container_name: tulip_app
    image: ggsheet/tulip_app:1.0.0
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    env_file:
      - .env.docker
    ports: 
      - "8080:8080"
    depends_on:
      - tulip_db

  tulip_db:
    container_name: tulip_db
    image: postgres:16
    env_file:
      - .env.docker
    # Bound to VM localhost only — use an SSH tunnel for TablePlus (not open to the internet).
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Self-signed certs for Postgres TLS (see scripts/check-db-ssl.sh)
      - ./server.crt:/etc/ssl/certs/server.crt:ro
      - ./server.key:/etc/ssl/private/server.key:ro

volumes:
  pgdata:
